<!DOCTYPE html>
<html>
<head>
    <title>工厂布置系统使用指南</title>
    <style>
        body { font-family: 'Microsoft YaHei'; padding: 20px; text-align: center; }
        .qr-container { margin: 30px auto; }
        .steps { margin: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>工厂总平面布置交互系统使用指南</h1>
    <div class="qr-container">
        <p>网址：https://factory-layout-system.vercel.app</p>
    </div>
    <div class="steps">
        <h2>使用步骤：</h2>
        <p>1. 从左侧建筑库中选择建筑类型</p>
        <p>2. 拖动、旋转、缩放布置在厂区内</p>
        <p>3. 点击“教学模式”查看分区指引</p>
        <p>4. 点击“检测”检查布置合理性</p>
        <p>5. 使用“建筑系数”、“绿地率”计算指标</p>
    </div>
</body>
</html>
